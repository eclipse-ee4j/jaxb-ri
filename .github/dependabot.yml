version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      actions-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "maven"
    directory: "jaxb-ri"
    schedule:
      interval: "daily"
    ignore:
      # 0.9.0, 0.10.0 does not seem to produce central.zip
      - dependency-name: "org.sonatype.central:central-publishing-maven-plugin"
        versions: [ "0.9.0", "0.10.0" ]
    groups:
      maven-plugins:
        patterns:
          - "*:*-plugin"
      dependencies:
        patterns:
          - "*"
